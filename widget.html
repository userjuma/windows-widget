<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Widget</title>
    <style>
        /* Drag is handled via CSS region - works natively in Edge/Chrome app mode */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #141416;
            overflow: hidden;
            user-select: none;
            color: #fff;
            height: 100vh;
            width: 100vw;
        }

        #app {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 14px 16px 12px;
            gap: 10px;
        }

        /* ---- TOP BAR ---- */
        #topbar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            height: 24px;
            gap: 6px;
            -webkit-app-region: drag;
            cursor: grab;
        }

        #online-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #32d74b;
            margin-right: auto;
            transition: background 0.4s;
        }

        #online-dot.offline {
            background: #ff453a;
        }

        .ctrl-btn {
            -webkit-app-region: no-drag;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.35);
            cursor: pointer;
            width: 24px;
            height: 24px;
            border-radius: 6px;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, color 0.15s;
        }

        .ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        #close-btn:hover {
            background: rgba(255, 60, 60, 0.25);
            color: #ff453a;
        }

        /* ---- WEATHER ---- */
        #weather-section {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 0 4px;
        }

        #weather-icon-wrap {
            width: 64px;
            height: 64px;
            flex-shrink: 0;
        }

        #weather-icon-wrap svg {
            width: 100%;
            height: 100%;
        }

        #weather-meta {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        #weather-temp {
            font-size: 44px;
            font-weight: 200;
            line-height: 1;
            letter-spacing: -1px;
        }

        #weather-city-name {
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.55);
            cursor: pointer;
            transition: color 0.15s;
        }

        #weather-city-name:hover {
            color: #fff;
            text-decoration: underline;
        }

        #weather-condition-text {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 1px;
        }

        #weather-cached-label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.2);
            margin-top: 2px;
        }

        /* Weather search inline */
        #weather-search-wrap {
            display: none;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            position: relative;
        }

        #weather-search-wrap.open {
            display: flex;
        }

        #weather-input {
            background: rgba(255, 255, 255, 0.09);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 8px;
            padding: 7px 12px;
            color: #fff;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            width: 220px;
        }

        #weather-input::placeholder {
            color: rgba(255, 255, 255, 0.28);
        }

        #weather-input:focus {
            border-color: rgba(255, 159, 10, 0.5);
        }

        #weather-geo-btn {
            background: rgba(255, 159, 10, 0.12);
            border: 1px solid rgba(255, 159, 10, 0.3);
            border-radius: 8px;
            padding: 5px 12px;
            color: rgba(255, 159, 10, 1);
            cursor: pointer;
            font-size: 12px;
            font-family: inherit;
            align-self: flex-start;
            transition: background 0.2s;
        }

        #weather-geo-btn:hover {
            background: rgba(255, 159, 10, 0.22);
        }

        .dropdown {
            position: absolute;
            top: 36px;
            left: 0;
            background: #26262a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            min-width: 220px;
            z-index: 200;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .dropdown-item {
            padding: 8px 12px;
            font-size: 12px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.12s;
        }

        .dropdown-item:last-child {
            border-bottom: none;
        }

        .dropdown-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .dropdown-item .sub {
            color: rgba(255, 255, 255, 0.3);
            font-size: 11px;
        }

        /* ---- CLOCKS ---- */
        #clocks-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            overflow: hidden;
        }

        #clocks-row {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 2px;
            flex: 1;
            align-items: stretch;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
        }

        #clocks-row::-webkit-scrollbar {
            height: 3px;
        }

        #clocks-row::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        .clock-card {
            background: #222226;
            border-radius: 14px;
            padding: 13px 15px 12px;
            min-width: 155px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 3px;
            position: relative;
            -webkit-app-region: no-drag;
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .card-city {
            font-size: 13px;
            font-weight: 600;
            color: #ff9f0a;
            line-height: 1.2;
            max-width: 110px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-daynight {
            font-size: 15px;
            line-height: 1;
            opacity: 0.9;
        }

        .card-date {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
        }

        .card-time {
            font-size: 30px;
            font-weight: 600;
            color: #ff9f0a;
            letter-spacing: -0.5px;
            margin-top: 3px;
        }

        .card-remove {
            display: none;
            position: absolute;
            top: 7px;
            right: 9px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.18);
            cursor: pointer;
            font-size: 13px;
            padding: 1px 3px;
            border-radius: 4px;
            line-height: 1;
            -webkit-app-region: no-drag;
        }

        .clock-card:hover .card-city {
            max-width: 80px;
        }

        .clock-card:hover .card-remove {
            display: block;
        }

        .card-remove:hover {
            color: #ff453a;
            background: rgba(255, 60, 60, 0.15);
        }

        #add-city-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed rgba(255, 255, 255, 0.13);
            border-radius: 14px;
            min-width: 80px;
            flex-shrink: 0;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.28);
            font-size: 20px;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.18s;
            -webkit-app-region: no-drag;
            align-self: stretch;
        }

        #add-city-btn:hover {
            background: rgba(255, 255, 255, 0.09);
            color: rgba(255, 255, 255, 0.6);
        }

        /* ---- ADD CITY PANEL ---- */
        #city-panel {
            display: none;
            background: #222226;
            border-radius: 12px;
            padding: 10px;
            gap: 7px;
            flex-direction: column;
            max-height: 180px;
            -webkit-app-region: no-drag;
        }

        #city-panel.open {
            display: flex;
        }

        #city-search-input {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.13);
            border-radius: 8px;
            padding: 7px 11px;
            color: #fff;
            font-size: 12px;
            font-family: inherit;
            outline: none;
        }

        #city-search-input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        #city-search-input:focus {
            border-color: rgba(255, 159, 10, 0.45);
        }

        #city-results {
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.08) transparent;
        }

        #city-results::-webkit-scrollbar {
            width: 3px;
        }

        #city-results::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        .city-result {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 9px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.12s;
        }

        .city-result:hover {
            background: rgba(255, 255, 255, 0.07);
        }

        .city-result.already-added {
            opacity: 0.3;
            cursor: default;
            pointer-events: none;
        }

        .city-result-country {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
        }

        /* ---- LIGHT THEME OVERRIDES ---- */
        body.theme-light {
            background: #f2f2f7;
            color: #1c1c1e;
        }

        body.theme-light .clock-card,
        body.theme-light #city-panel {
            background: #ffffff;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
        }

        body.theme-light .dropdown {
            background: #ffffff;
            border-color: rgba(0, 0, 0, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        body.theme-light .dropdown-item {
            border-bottom-color: rgba(0, 0, 0, 0.05);
        }

        body.theme-light .dropdown-item:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        body.theme-light .dropdown-item .sub {
            color: rgba(0, 0, 0, 0.5);
        }

        body.theme-light #weather-city-name {
            color: rgba(0, 0, 0, 0.6);
        }

        body.theme-light #weather-city-name:hover {
            color: #000;
        }

        body.theme-light #weather-condition-text,
        body.theme-light .card-date {
            color: rgba(0, 0, 0, 0.5);
        }

        body.theme-light #weather-cached-label {
            color: rgba(0, 0, 0, 0.4);
        }

        body.theme-light .ctrl-btn {
            color: rgba(0, 0, 0, 0.4);
        }

        body.theme-light .ctrl-btn:hover {
            background: rgba(0, 0, 0, 0.08);
            color: #000;
        }

        body.theme-light #close-btn:hover {
            background: rgba(255, 60, 60, 0.15);
            color: #ff453a;
        }

        body.theme-light #weather-input,
        body.theme-light #city-search-input {
            background: rgba(0, 0, 0, 0.03);
            border-color: rgba(0, 0, 0, 0.1);
            color: #000;
        }

        body.theme-light #weather-input::placeholder,
        body.theme-light #city-search-input::placeholder {
            color: rgba(0, 0, 0, 0.4);
        }

        body.theme-light #weather-input:focus,
        body.theme-light #city-search-input:focus {
            border-color: rgba(255, 159, 10, 0.5);
        }

        body.theme-light .card-remove {
            color: rgba(0, 0, 0, 0.3);
        }

        body.theme-light #add-city-btn {
            background: rgba(0, 0, 0, 0.02);
            border-color: rgba(0, 0, 0, 0.1);
            color: rgba(0, 0, 0, 0.3);
        }

        body.theme-light #add-city-btn:hover {
            background: rgba(0, 0, 0, 0.05);
            color: rgba(0, 0, 0, 0.6);
        }

        body.theme-light .city-result:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        body.theme-light .city-result-country {
            color: rgba(0, 0, 0, 0.4);
        }
    </style>
</head>

                </div>

        </div>

        <!-- CLOCKS -->
        <div id="clocks-section">
            <div id="clocks-row">
                <!-- clock cards injected here -->

            <div id="city-panel">

                <div id="city-results"></div>

            return fetch(API_BASE + path, {

        // ===================== UTILS =====================
        function isApi() { return window.pywebview && window.pywebview.api; }

        function getLocalHour(timezone) {
            try {
                var s = new Intl.DateTimeFormat('en-US', { timeZone: timezone, hour: 'numeric', hour12: false }).format(new Date());
                return parseInt(s, 10);
            } catch (e) { return 12; }
        }

        function isDaytime(timezone) {
            var h = getLocalHour(timezone);
            return h >= 6 && h < 20;
        }

        function formatTime(timezone) {
            return new Intl.DateTimeFormat('en-US', {
                timeZone: timezone, hour: '2-digit', minute: '2-digit', hour12: false
            }).format(new Date());
        }

        function formatDate(timezone) {
            return new Intl.DateTimeFormat('en-US', {
                timeZone: timezone, weekday: 'short', day: 'numeric', month: 'short'
            }).format(new Date());
        }

        function getWeatherSVG(code, night) {
            if (code === 0) return night ? SVG_MOON : SVG_SUN;
            if (code <= 3) return SVG_PARTLY;
            if (code <= 48) return SVG_FOG;
            if (code <= 57) return SVG_RAIN;
            if (code <= 67) return SVG_RAIN;
            if (code <= 77) return SVG_SNOW;
            if (code <= 82) return SVG_RAIN;
            return SVG_THUNDER;
        }

        function conditionText(code) {
            if (code === 0) return 'Clear sky';
            if (code === 1) return 'Mainly clear';
            if (code === 2) return 'Partly cloudy';
            if (code === 3) return 'Overcast';
            if (code === 45 || code === 48) return 'Foggy';
            if (code <= 55) return 'Drizzle';
            if (code <= 67) return 'Rain';
            if (code <= 77) return 'Snow';
            if (code <= 82) return 'Rain showers';
            if (code <= 86) return 'Snow showers';
            return 'Thunderstorm';
        }

        // ===================== CLOCK RENDERING =====================
        function renderClocks() {
            var row = document.getElementById('clocks-row');
            var addBtn = document.getElementById('add-city-btn');
            var cards = row.querySelectorAll('.clock-card');
            cards.forEach(function (c) { c.remove(); });

            state.cities.forEach(function (city, idx) {
                var day = isDaytime(city.timezone);
                var card = document.createElement('div');
                card.className = 'clock-card';
                card.dataset.idx = idx;
                card.innerHTML = [
                    '<div class="card-top">',
                    '  <span class="card-city">', city.name, '</span>',
                    '  <span class="card-daynight">', day ? '&#9728;' : '&#9790;', '</span>',
                    '</div>',
                    '<div class="card-date">', formatDate(city.timezone), '</div>',
                    '<div class="card-time">', formatTime(city.timezone), '</div>',
                    '<button class="card-remove" data-idx="', idx, '" title="Remove">&times;</button>'
                ].join('');
                row.insertBefore(card, addBtn);
            });

            row.querySelectorAll('.card-remove').forEach(function (btn) {
                btn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    var i = parseInt(this.dataset.idx, 10);
                    state.cities.splice(i, 1);
                    saveConfig();
                    renderClocks();
                });
            });
        }

        function tickClocks() {
            var cards = document.querySelectorAll('.clock-card');
            cards.forEach(function (card) {
                var idx = parseInt(card.dataset.idx, 10);
                if (isNaN(idx) || !state.cities[idx]) return;
                var tz = state.cities[idx].timezone;
                var day = isDaytime(tz);
                var timeEl = card.querySelector('.card-time');
                var dateEl = card.querySelector('.card-date');
                var iconEl = card.querySelector('.card-daynight');
                if (timeEl) timeEl.textContent = formatTime(tz);
                if (dateEl) dateEl.textContent = formatDate(tz);
                if (iconEl) iconEl.innerHTML = day ? '&#9728;' : '&#9790;';
            });
        }

        // ===================== WEATHER =====================
        function renderWeather(data, cached) {
            var temp = document.getElementById('weather-temp');
            var city = document.getElementById('weather-city-name');
            var cond = document.getElementById('weather-condition-text');
            var icon = document.getElementById('weather-icon-wrap');
            var cache = document.getElementById('weather-cached-label');

            if (!data) {
                temp.textContent = '--';
                city.textContent = state.weather.city || 'Set location';
                cond.textContent = '';
                icon.innerHTML = SVG_CLOUD;
                cache.textContent = '';
                return;
            }

            var night = !isDaytime(data.timezone || 'UTC');
            temp.textContent = Math.round(data.temperature) + '\u00b0';
            city.textContent = data.city;
            cond.textContent = conditionText(data.code);
            icon.innerHTML = getWeatherSVG(data.code, night);
            cache.textContent = cached ? 'Last updated: ' + (data.updated || '') : '';
        }

        function fetchWeather() {
            if (!state.weather.lat || !state.weather.lon) return;
            var url = 'https://api.open-meteo.com/v1/forecast?latitude=' + state.weather.lat +
                '&longitude=' + state.weather.lon +
                '&current=temperature_2m,weather_code&timezone=auto';
            fetch(url).then(function (r) { return r.json(); }).then(function (d) {
                if (!d.current) return;
                var cacheData = {
                    city: state.weather.city,
                    temperature: d.current.temperature_2m,
                    code: d.current.weather_code,
                    timezone: d.timezone,
                    updated: new Date().toLocaleTimeString()
                };
                state.weatherData = cacheData;
                state.weatherCached = false;
                renderWeather(cacheData, false);
                apiPost('/api/weather-cache', cacheData);
            }).catch(function () { /* offline, keep cached */ });
        }

        function detectLocation() {
            document.getElementById('weather-geo-btn').textContent = 'Detecting...';
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function (pos) {
                    reverseGeocode(pos.coords.latitude, pos.coords.longitude);
                }, function () {
                    ipGeolocate();
                }, { timeout: 8000 });
            } else {
                ipGeolocate();
            }
        }

        function ipGeolocate() {
            fetch('https://ipapi.co/json/').then(function (r) { return r.json(); }).then(function (d) {
                if (d.latitude && d.longitude) {
                    state.weather.city = d.city || d.region || 'My Location';
                    state.weather.lat = d.latitude;
                    state.weather.lon = d.longitude;
                    document.getElementById('weather-city-name').textContent = state.weather.city;
                    document.getElementById('weather-geo-btn').textContent = 'Detect my location';
                    closeWeatherSearch();
                    saveConfig();
                    fetchWeather();
                }
            }).catch(function () {
                document.getElementById('weather-geo-btn').textContent = 'Detect my location';
            });
        }

        function reverseGeocode(lat, lon) {
            var url = 'https://geocoding-api.open-meteo.com/v1/search?name=&count=1';
            // Use reverse via nominatim
            fetch('https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lon + '&format=json')
                .then(function (r) { return r.json(); })
                .then(function (d) {
                    var city = d.address && (d.address.city || d.address.town || d.address.village || d.address.county) || 'My Location';
                    state.weather.city = city;
                    state.weather.lat = lat;
                    state.weather.lon = lon;
                    document.getElementById('weather-geo-btn').textContent = 'Detect my location';
                    closeWeatherSearch();
                    saveConfig();
                    fetchWeather();
                }).catch(function () { ipGeolocate(); });
        }

        function searchWeatherCity(query) {
            if (!query) { document.getElementById('weather-dropdown').style.display = 'none'; return; }
            var url = 'https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(query) + '&count=6&language=en&format=json';
            fetch(url).then(function (r) { return r.json(); }).then(function (d) {
                var dd = document.getElementById('weather-dropdown');
                if (!d.results || !d.results.length) { dd.style.display = 'none'; return; }
                dd.innerHTML = '';
                d.results.forEach(function (r) {
                    var item = document.createElement('div');
                    item.className = 'dropdown-item';
                    item.innerHTML = '<strong>' + r.name + '</strong>' +
                        '<span class="sub"> &nbsp;' + (r.country || '') + (r.admin1 ? ', ' + r.admin1 : '') + '</span>';
                    item.addEventListener('click', function () {
                        state.weather.city = r.name;
                        state.weather.lat = r.latitude;
                        state.weather.lon = r.longitude;
                        dd.style.display = 'none';
                        document.getElementById('weather-input').value = '';
                        closeWeatherSearch();
                        document.getElementById('weather-city-name').textContent = r.name;
                        saveConfig();
                        fetchWeather();
                    });
                    dd.appendChild(item);
                });
                dd.style.display = 'block';
            }).catch(function () { });
        }

        function openWeatherSearch() {
            state.weatherSearchOpen = true;
            document.getElementById('weather-search-wrap').classList.add('open');
            document.getElementById('weather-meta').style.display = 'none';
            document.getElementById('weather-icon-wrap').style.display = 'none';
            setTimeout(function () { document.getElementById('weather-input').focus(); }, 50);
        }

        function closeWeatherSearch() {
            state.weatherSearchOpen = false;
            document.getElementById('weather-search-wrap').classList.remove('open');
            document.getElementById('weather-meta').style.display = '';
            document.getElementById('weather-icon-wrap').style.display = '';
            document.getElementById('weather-dropdown').style.display = 'none';
            document.getElementById('weather-input').value = '';
        }

        // ===================== CITY SEARCH =====================
        function openCityPanel() {
            state.cityPanelOpen = true;
            document.getElementById('city-panel').classList.add('open');
            renderCityResults('');
            setTimeout(function () { document.getElementById('city-search-input').focus(); }, 50);
        }

        function closeCityPanel() {
            state.cityPanelOpen = false;
            document.getElementById('city-panel').classList.remove('open');
            document.getElementById('city-search-input').value = '';
        }

        function renderCityResults(query) {
            var container = document.getElementById('city-results');
            var q = query.toLowerCase().trim();
            var addedNames = state.cities.map(function (c) { return c.name.toLowerCase(); });
            var filtered = ALL_CITIES.filter(function (c) {
                return !q || c.name.toLowerCase().includes(q) || c.country.toLowerCase().includes(q);
            });
            if (!q) filtered = filtered.slice(0, 40);

            container.innerHTML = '';
            filtered.forEach(function (city) {
                var already = addedNames.includes(city.name.toLowerCase());
                var row = document.createElement('div');
                row.className = 'city-result' + (already ? ' already-added' : '');
                row.innerHTML = '<span>' + city.name + '</span><span class="city-result-country">' + city.country + '</span>';
                if (!already) {
                    row.addEventListener('click', function () {
                        state.cities.push({ name: city.name, timezone: city.timezone, country: city.country });
                        saveConfig();
                        renderClocks();
                        renderCityResults(document.getElementById('city-search-input').value);
                    });
                }
                container.appendChild(row);
            });
        }

        // ===================== PERSISTENCE =====================
        function saveConfig() {
            apiPost('/api/config', {
                cities: state.cities,
                weather: state.weather,
                theme: state.theme,
                window: { x: 0, y: 0 }
            });
        }

        // ===================== THEME =====================
        function applyTheme() {
            var t = state.theme;
            if (t === 'auto') {
                t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            if (t === 'light') document.body.classList.add('theme-light');
            else document.body.classList.remove('theme-light');

            var btn = document.getElementById('theme-btn');
            if (state.theme === 'auto') btn.innerHTML = '&#9681;'; // half circle
            else if (state.theme === 'light') btn.innerHTML = '&#9788;'; // sun
            else btn.innerHTML = '&#9789;'; // moon
        }

        // ===================== ONLINE STATUS =====================
        function updateOnlineStatus() {
            var dot = document.getElementById('online-dot');
            if (navigator.onLine) {
                dot.classList.remove('offline');
                dot.title = 'Online';
            } else {
                dot.classList.add('offline');
                dot.title = 'Offline - showing cached weather';
            }
        }

        // ===================== BOOT =====================
        async function boot() {
            updateOnlineStatus();
            window.addEventListener('online', function () { updateOnlineStatus(); fetchWeather(); });
            window.addEventListener('offline', updateOnlineStatus);
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function () {
                if (state.theme === 'auto') applyTheme();
            });

            var cfg = await apiGet('/api/config');
            if (cfg) {
                state.cities = cfg.cities || DEFAULT_CITIES;
                state.weather = cfg.weather || { city: '', lat: null, lon: null };
                state.theme = cfg.theme || 'auto';
            } else {
                state.cities = DEFAULT_CITIES.slice();
            }

            applyTheme();

            var cache = await apiGet('/api/weather-cache');
            if (cache && cache.city) {
                state.weatherData = cache;
                state.weatherCached = true;
                renderWeather(cache, true);
            }

            renderClocks();
            setInterval(tickClocks, 1000);

            if (state.weather.lat && state.weather.lon) {
                fetchWeather();
            } else if (!state.weatherData) {
                openWeatherSearch();
            }

            setInterval(fetchWeather, 10 * 60 * 1000);

            // Controls
            document.getElementById('theme-btn').addEventListener('click', function () {
                if (state.theme === 'auto') state.theme = 'light';
                else if (state.theme === 'light') state.theme = 'dark';
                else state.theme = 'auto';
                applyTheme();
                saveConfig();
            });

            document.getElementById('close-btn').addEventListener('click', function () {
                apiPost('/api/quit', {}).finally(function () { window.close(); });
            });

            document.getElementById('weather-edit-btn').addEventListener('click', function () {
                if (state.weatherSearchOpen) closeWeatherSearch();
                else openWeatherSearch();
            });

            document.getElementById('weather-city-name').addEventListener('click', function () {
                openWeatherSearch();
            });

            document.getElementById('weather-geo-btn').addEventListener('click', detectLocation);

            var weatherInput = document.getElementById('weather-input');
            var searchTimer = null;
            weatherInput.addEventListener('input', function () {
                clearTimeout(searchTimer);
                var v = this.value.trim();
                searchTimer = setTimeout(function () { searchWeatherCity(v); }, 350);
            });
            weatherInput.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') closeWeatherSearch();
            });

            document.getElementById('add-city-btn').addEventListener('click', function () {
                if (state.cityPanelOpen) closeCityPanel();
                else openCityPanel();
            });

            document.getElementById('city-search-input').addEventListener('input', function () {
                renderCityResults(this.value);
            });
            document.getElementById('city-search-input').addEventListener('keydown', function (e) {
                if (e.key === 'Escape') closeCityPanel();
            });

            document.addEventListener('click', function (e) {
                var dd = document.getElementById('weather-dropdown');
                if (!dd.contains(e.target) && e.target !== weatherInput) {
                    dd.style.display = 'none';
                }
            });
